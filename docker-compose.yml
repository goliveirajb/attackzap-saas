version: "3.8"

services:
  backend:
    build: ./backend
    container_name: attackzap-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - N8N_API_URL=${N8N_API_URL}
      - N8N_API_KEY=${N8N_API_KEY}
      - PORT=3000
    networks:
      - attackzap

  frontend:
    build: ./frontend
    container_name: attackzap-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - attackzap

networks:
  attackzap:
    driver: bridge
